sc_NuevaInspeccion_Datos As screen:
    Fill: =ColorA6.C_FondoClaro1
    OnVisible: =Set(tipovehiculo,"A")

    Container1_1 As groupContainer.manualLayoutContainer:
        DropShadow: =DropShadow.Regular
        Height: =75
        Width: =1366
        ZIndex: =1

    Button2_1 As button:
        Align: =Align.Left
        Color: =RGBA(9, 33, 98, 1)
        DisabledColor: =RGBA(9, 33, 98, 1)
        DisabledFill: =RGBA(255, 255, 255, 1)
        Fill: =RGBA(0, 0, 0, 0)
        Height: =75
        PaddingBottom: =3
        PaddingLeft: =33
        PaddingRight: =3
        PaddingTop: =3
        RadiusBottomLeft: =0
        RadiusBottomRight: =0
        RadiusTopLeft: =0
        RadiusTopRight: =0
        Text: ="A6 | Sistema de Inspección Neumaticos"
        Width: =1366
        ZIndex: =2

    Container1_2 As groupContainer.manualLayoutContainer:
        BorderStyle: =BorderStyle.None
        Height: =673
        RadiusBottomLeft: =11
        RadiusBottomRight: =11
        RadiusTopLeft: =11
        RadiusTopRight: =11
        Width: =Parent.Width
        Y: =95
        ZIndex: =3

        Container2 As groupContainer.manualLayoutContainer:
            BorderColor: =RGBA(230, 230, 230, 1)
            BorderThickness: =1
            DropShadow: =DropShadow.Semilight
            Fill: =RGBA(255, 255, 255, 1)
            Height: =582
            RadiusBottomLeft: =16
            RadiusBottomRight: =16
            RadiusTopLeft: =16
            RadiusTopRight: =16
            Width: =698
            X: =350
            Y: =40
            ZIndex: =1

            Label3 As label:
                FontWeight: =FontWeight.Bold
                Height: =92
                Size: =33
                Text: ="Datos de la Inspección"
                Width: =616
                X: =41
                ZIndex: =1

            Label4 As label:
                Size: =11
                Text: ="Placa del Vehículo"
                Width: =617
                X: =40
                Y: =92
                ZIndex: =2

            lbl_placa As text:
                Align: =Align.Center
                Default: =
                Fill: =ColorA6.C_FondoClaro1
                Height: =58
                HintText: ="ABC-123"
                MaxLength: =7
                RadiusBottomLeft: =19
                RadiusBottomRight: =19
                RadiusTopLeft: =19
                RadiusTopRight: =19
                Width: =616
                X: =40
                Y: =132
                ZIndex: =3

            Label4_1 As label:
                Size: =11
                Text: ="Kilometraje"
                Width: =617
                X: =39
                Y: =206
                ZIndex: =4

            lbl_kilometraje As text:
                Align: =Align.Center
                Default: =
                Fill: =ColorA6.C_FondoClaro1
                Format: =TextFormat.Number
                Height: =58
                HintText: ="0123"
                MaxLength: =8
                RadiusBottomLeft: =19
                RadiusBottomRight: =19
                RadiusTopLeft: =19
                RadiusTopRight: =19
                Width: =616
                X: =39
                Y: =246
                ZIndex: =5

            Button6 As button:
                Color: =If(tipovehiculo="TRACTO",ColorA6.C_FondoClaro,Color.White)
                Fill: =If(tipovehiculo="TRACTO",Color.Orange,ColorA6.C_FondoOscu)
                Height: =101
                OnSelect: =Set(tipovehiculo,"TRACTO")
                PaddingBottom: =3
                PaddingLeft: =3
                PaddingRight: =3
                PaddingTop: =3
                RadiusBottomLeft: =16
                RadiusBottomRight: =16
                RadiusTopLeft: =16
                RadiusTopRight: =16
                Size: =19
                Text: |-
                    ="🚛
                    Tracto"
                Width: =285
                X: =40
                Y: =355
                ZIndex: =6

            Button6_1 As button:
                Color: =If(tipovehiculo="TRACTO",ColorA6.C_FondoClaro,Color.White)
                Fill: =If(tipovehiculo="CARRETA",Color.Orange,ColorA6.C_FondoOscu)
                Height: =101
                OnSelect: =Set(tipovehiculo,"CARRETA")
                PaddingBottom: =3
                PaddingLeft: =3
                PaddingRight: =3
                PaddingTop: =3
                RadiusBottomLeft: =16
                RadiusBottomRight: =16
                RadiusTopLeft: =16
                RadiusTopRight: =16
                Size: =19
                Text: |-
                    ="🚚
                    Carreta"
                Width: =289
                X: =366
                Y: =355
                ZIndex: =7

            Button7 As button:
                DisplayMode: =If(tipovehiculo="TRACTO" Or tipovehiculo="CARRETA",DisplayMode.Edit,DisplayMode.Disabled)
                Fill: =RGBA(10, 88, 245, 1)
                Height: =74
                OnSelect: |-
                    =Navigate(sc_NuevaInspeccion_Unidad,ScreenTransition.Cover);
                    Set(varInspeccionCabezera,
                    {
                        placa:lbl_placa.Text,
                        kilometraje:lbl_kilometraje.Text,
                        Tipounidad:tipovehiculo
                    }
                    )
                RadiusBottomLeft: =16
                RadiusBottomRight: =16
                RadiusTopLeft: =16
                RadiusTopRight: =16
                Size: =11
                Text: ="INICIAR INSPECCIIÓN"
                Width: =616
                X: =41
                Y: =481
                ZIndex: =8

            Label4_2 As label:
                Size: =11
                Text: ="Tipico de vehículo"
                Width: =617
                X: =40
                Y: =315
                ZIndex: =9

    Label7 As label:
        Color: =RGBA(10, 88, 245, 1)
        Font: =Font.Arial
        Size: =11
        Text: ="Volver al menú"
        X: =386
        Y: =90
        ZIndex: =4

    Icon2 As icon:
        Color: =RGBA(10, 88, 245, 1)
        Height: =31
        Icon: =Icon.ChevronLeft
        OnSelect: =Navigate(Incio)
        PaddingBottom: =9
        PaddingRight: =300
        PaddingTop: =9
        Width: =333
        X: =354
        Y: =95
        ZIndex: =5

