                                TIPOVEHICULO:dTIPOVEHICULO,
                                DESGASTE_DIA:Value(dDesgaste),
                                HORAINSPECCION:dHORAINSPECCION
                            }
                        )
                    );
                    SaveData(DetalleListaLocal,"DetalleListaLocalOffline");
                    SaveData(DetalleListaLocal1,"DetalleListaLocalOffline1");
                    Clear(DetalleInspeccion);
                    Notify("Inspecciones Sincronizadas, muchas gracias");
                    Navigate(Incio)
