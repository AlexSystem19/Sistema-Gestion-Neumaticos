Incio As screen:
    Fill: =ColorA6.C_FondoClaro1
    OnVisible: |-
        =ClearCollect(
            Contadores,
            {Titulo: "Total Local",Numc:CountRows(DetalleListaLocal)},
            {Titulo: "Pendientes",Numc:CountRows(DetalleInspeccion)},
            {Titulo: "Sincronizadas",Numc:CountRows(ListSync)},
            {Titulo: "Conexión"}
        );
        ClearCollect(
            MenuList,
            {
                Titulo: "	Nueva Inspección	",
                desp: "Iniciar nueva inespección de nuemáticos",
                Icon:Icon.Camera,
                Navegar:sc_NuevaInspeccion_Datos,
                Color:RGBA(39, 113, 194, 1)
            },
            {
                Titulo: "	Historial	",
                desp: "Ver inspecciones realizadas",
                Icon:Icon.History,
                Navegar:sc_Historial,
                Color:RGBA(39, 113, 194, 1)
            },
            {
                Titulo: "	Sincronizar	",
                desp: "Enviar datos al servidor",
                Icon:Icon.Sync,
                Navegar:sc_Sincronizar,
                Color:RGBA(39, 113, 194, 1)
            },
            {
                Titulo: "	Dashboard	",
                desp: "Estadisticas y reportes",
                Icon:Icon.Trending,
                Navegar:sc_NuevaInspeccion_Datos,
                Color:ColorA6.C_FondoOscu
            },
            {
                Titulo: "	Busqueda	",
                desp: "Buscar inspecciones",
                Icon:Icon.Search,
                Navegar:sc_Buscar,
                Color:ColorA6.C_FondoOscu
        
            },
            {
                Titulo: "	Configuración	",
                desp: "Ajustes del sistema",
                Icon:Icon.Hamburger,
                Navegar:sc_Configuracion,
                Color:ColorA6.C_FondoOscu
            }
        )

    Container1 As groupContainer.manualLayoutContainer:
        DropShadow: =DropShadow.Regular
        Height: =75
        Width: =1366
        ZIndex: =2

    Button2 As button:
        Align: =Align.Left
        Color: =RGBA(9, 33, 98, 1)
        DisabledColor: =RGBA(9, 33, 98, 1)
        DisabledFill: =RGBA(255, 255, 255, 1)
        Fill: =RGBA(0, 0, 0, 0)
        Height: =75
        PaddingBottom: =3
        PaddingLeft: =66
        PaddingRight: =3
        PaddingTop: =3
        RadiusBottomLeft: =0
        RadiusBottomRight: =0
        RadiusTopLeft: =0
        RadiusTopRight: =0
        Text: ="A6 | Sistema de Inspección Neumaticos"
        Width: =1366
        ZIndex: =3

    "Gallery1 As gallery.'BrowseLayout_Vertical_TwoTextOneImageVariant_ver5.0'":
        DelayItemLoading: =true
        Height: =131
        Items: =Contadores
        Layout: =Layout.Vertical
        LoadingSpinner: =LoadingSpinner.Data
        TemplatePadding: =0
        TemplateSize: =131
        Width: =1264
        WrapCount: =4
        X: =66
        Y: =168
        ZIndex: =4

        Button3 As button:
            Align: =Align.Left
            BorderColor: =Color.Black
            Color: =RGBA(9, 33, 98, 1)
            Fill: =RGBA(0, 0, 0, 0)
            Height: =103
            OnSelect: =Select(Parent)
            PaddingBottom: =11
            PaddingLeft: =11
            PaddingRight: =3
            PaddingTop: =11
            RadiusBottomLeft: =11
            RadiusBottomRight: =11
            RadiusTopLeft: =11
            RadiusTopRight: =11
