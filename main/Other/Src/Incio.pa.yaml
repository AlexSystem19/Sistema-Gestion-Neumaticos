Screens:
  Incio:
    Properties:
      Fill: =ColorA6.C_FondoClaro1
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnVisible: |-
        =ClearCollect(
            Contadores,
            {Titulo: "Total Local",Numc:CountRows(DetalleListaLocal)},
            {Titulo: "Pendientes",Numc:CountRows(DetalleInspeccion)},
            {Titulo: "Sincronizadas",Numc:CountRows(ListSync)},
            {Titulo: "Conexión"}
        );
        ClearCollect(
            MenuList,
            {
                Titulo: "	Nueva Inspección	",
                desp: "Iniciar nueva inespección de nuemáticos",
                Icon:Icon.Camera,
                Navegar:sc_NuevaInspeccion_Datos,
                Color:RGBA(39, 113, 194, 1)
            },
            {
                Titulo: "	Historial	",
                desp: "Ver inspecciones realizadas",
                Icon:Icon.History,
                Navegar:sc_Historial,
                Color:RGBA(39, 113, 194, 1)
            },
            {
                Titulo: "	Sincronizar	",
                desp: "Enviar datos al servidor",
                Icon:Icon.Sync,
                Navegar:sc_Sincronizar,
                Color:RGBA(39, 113, 194, 1)
            },
            {
                Titulo: "	Dashboard	",
                desp: "Estadisticas y reportes",
                Icon:Icon.Trending,
                Navegar:sc_NuevaInspeccion_Datos,
                Color:ColorA6.C_FondoOscu
            },
            {
                Titulo: "	Busqueda	",
                desp: "Buscar inspecciones",
                Icon:Icon.Search,
                Navegar:sc_Buscar,
                Color:ColorA6.C_FondoOscu

            },
            {
                Titulo: "	Configuración	",
                desp: "Ajustes del sistema",
                Icon:Icon.Hamburger,
                Navegar:sc_Configuracion,
                Color:ColorA6.C_FondoOscu
            }
        )
    Children:
      - Container1:
          Control: GroupContainer@1.3.0
          Variant: ManualLayout
          Properties:
            DropShadow: =DropShadow.Regular
            Height: =75
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Width: =1366
      - Button2:
          Control: Classic/Button@2.2.0
          Properties:
            Align: =Align.Left
            BorderColor: =ColorFade(Self.Fill, -15%)
            Color: =RGBA(9, 33, 98, 1)
            DisabledBorderColor: =RGBA(166, 166, 166, 1)
            DisabledColor: =RGBA(9, 33, 98, 1)
            DisabledFill: =RGBA(255, 255, 255, 1)
            Fill: =RGBA(0, 0, 0, 0)
            Font: =Font.'Open Sans'
            Height: =75
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =RGBA(255, 255, 255, 1)
            HoverFill: =ColorFade(RGBA(56, 96, 178, 1), -20%)
            PaddingBottom: =3
            PaddingLeft: =66
            PaddingRight: =3
            PaddingTop: =3
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =Self.Color
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Text: ="A6 | Sistema de Inspección Neumaticos"
            Width: =1366
      - Gallery1:
